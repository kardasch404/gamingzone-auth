apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: gamingzone
data:
  NODE_ENV: "production"
  PORT: "42110"
  DATABASE_URL: "postgresql://gamingzone:password@postgres-auth:5432/auth_db"
  REDIS_URL: "redis://redis:6379"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
  JWT_EXPIRATION: "1h"
  REFRESH_TOKEN_EXPIRATION: "7d"
