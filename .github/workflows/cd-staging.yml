name: CD Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gamingzone/auth-service:staging-${{ github.sha }} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push gamingzone/auth-service:staging-${{ github.sha }}
          docker tag gamingzone/auth-service:staging-${{ github.sha }} gamingzone/auth-service:staging
          docker push gamingzone/auth-service:staging

      - name: Deploy to Kubernetes
        uses: azure/k8s-deploy@v4
        with:
          namespace: gamingzone-staging
          manifests: |
            k8s/configmap.yaml
            k8s/secret.yaml
            k8s/deployment.yaml
            k8s/service.yaml
            k8s/hpa.yaml
          images: gamingzone/auth-service:staging-${{ github.sha }}

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f http://auth-service.gamingzone-staging.svc.cluster.local:42110/api/v1/health || exit 1
